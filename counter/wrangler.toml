name = "aidisclose-counter"
main = "worker.js"
compatibility_date = "2024-11-01"

# Intentionally off: the counter is served only from the first-party custom
# domain below. The *.workers.dev hostname is disabled because Firefox tracking
# protection blocks it; preview URLs are unused. Setting these explicitly also
# silences the deploy warnings.
workers_dev = false
preview_urls = false

# KV namespace binding used by worker.js as env.AID_COUNTER.
# Replace `id` with the id printed by:
#   npx wrangler kv namespace create AID_COUNTER
[[kv_namespaces]]
binding = "AID_COUNTER"
id = "5f223e336aa744cbbe44a593dfd8eb5e"

# Serve the worker from a first-party subdomain of the site so Firefox's
# Enhanced Tracking Protection does not block it as a third-party
# *.workers.dev request. `wrangler deploy` provisions the DNS record and
# TLS cert automatically because aidisclose.org is on this Cloudflare account.
[[routes]]
pattern = "counter.aidisclose.org"
custom_domain = true
